        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'flex justify-end' : 'flex gap-3 chat-bubble';
            if(role === 'user') {
                div.innerHTML = `<div class="bg-black text-white p-3 px-5 rounded-2xl rounded-tr-none shadow-lg text-sm">${content}</div>`;
            } else {
                div.innerHTML = `
                    <div class="w-8 h-8 bg-black rounded-full flex-shrink-0 flex items-center justify-center text-[10px] text-white">AI</div>
                    <div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 text-sm text-gray-800 w-full">${content}</div>`;
            }
            chatBox.appendChild(div);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

            document.getElementById('user-input').value = text;
            sendMessage();

            let items = filterPromo ? db.products.filter(p => p.promo) : db.products;
            let html = `<p class='font-bold mb-3'>${filterPromo ? '🔥 Promo Spesial' : 'Daftar iPhone Tersedia'}:</p><div class='grid gap-4'>`;
            items.forEach(p => {
                html += `
                    <div class="bg-gray-50 border rounded-xl overflow-hidden shadow-sm">
                        <img src="${p.img}" class="w-full h-32 object-cover">
                        <div class="p-3">

                            <p class="text-[10px] text-gray-500 uppercase tracking-widest">${p.status} - Garansi ${p.garansi}</p>
                            <div class="mt-2">
                                ${p.promo ? `<span class="text-xs line-through text-gray-400 font-normal">Rp ${p.price.toLocaleString()}</span><br>` : ''}

                            </div>
                            <button onclick="startOrder('${p.name}', '${(p.promo || p.price).toLocaleString()}')" 
                                class="w-full mt-3 bg-black text-white py-2 rounded-lg text-xs font-bold transition active:scale-95">
                                Pesan Sekarang
                            </button>
                        </div>
                    </div>`;
            });
            html += `</div>`;
            appendMessage('bot', html);
        }

        function startOrder(name, price) {
            checkoutData.item = name;
            checkoutData.price = price;
            currentStep = "ask_name";
            appendMessage('bot', `Pilihan yang bagus! Anda memesan <b>${name}</b>.<br><br>Mohon isi <b>Nama Lengkap</b> Anda?`);

            appendMessage('bot', "Klik tombol di bawah untuk kirim pesanan ke WhatsApp.");
            const btn = document.createElement('div');
            btn.innerHTML = `<button onclick="window.open('https://wa.me/${waNumber}?text=${encodeURIComponent(text)}')" class="w-full bg-green-500 text-white p-4 rounded-2xl font-bold mt-2 shadow-lg flex items-center justify-center gap-2"><i class="fab fa-whatsapp text-xl"></i> KIRIM KE WHATSAPP</button>`;
            chatBox.appendChild(btn);
            currentStep = "chat";
        }

            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if(!val) return;

            appendMessage('user', val);
            input.value = "";

            if(currentStep === "ask_name") {
                checkoutData.name = val;
                currentStep = "ask_address";
                setTimeout(() => appendMessage('bot', `Halo Kak ${val}! Sekarang kirimkan <b>Alamat Lengkap</b> ya.`), 500);
                return;
            } else if(currentStep === "ask_address") {
                checkoutData.address = val;

                checkoutData.courier = val;
                finishCheckout();
                return;
